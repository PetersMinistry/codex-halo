[Rainmeter]
Update=1000
AccurateText=1
DynamicWindowSize=1
BackgroundMode=2
SolidColor=0,0,0,1
ContextTitle=Open Codex Halo Control
ContextAction=[!ActivateConfig "Rainmeter Codex Halo\Control" "Settings.ini"]
ContextTitle2=Refresh Codex Data
ContextAction2=[!CommandMeasure MeasureRefresh "Run"]
Group=CodexHalo
OnRefreshAction=[!CommandMeasure MeasureRefresh "Run"]

[Metadata]
Name=Codex Halo Welcome
Author=PetersMinistry
Information=First-run launcher for Codex Halo.
License=MIT
Version=0.5.9

[Variables]
@Include1=#@#CodexLimits.inc
@Include2=#@#Options.inc
W=376
H=232
PanelFill=7,12,19,238
PanelEdge=255,255,255,48
ButtonFill=255,255,255,20
ButtonHover=255,255,255,36
ButtonStroke=255,255,255,42
TextColor=246,248,252,242
DimText=163,173,188,220
FiveColor=41,232,139,255
WeekColor=82,160,255,255
FontFace=Segoe UI Variable Display
TextFace=Segoe UI Variable Text

[MeasureRefresh]
Measure=Plugin
Plugin=RunCommand
Program=%SystemRoot%\System32\WindowsPowerShell\v1.0\powershell.exe
Parameter=-NoProfile -ExecutionPolicy Bypass -File "#@#Scripts\Update-CodexLimits.ps1" -OutputPath "#@#CodexLimits.inc"
State=Hide
OutputType=ANSI
UpdateDivider=-1
FinishAction=[!CommandMeasure MeasureReadLimits "ReadLimits()"]

[MeasureReadLimits]
Measure=Script
ScriptFile=#@#Scripts\Read-CodexLimits.lua
LimitsPath=#@#CodexLimits.inc
UpdateDivider=-1

[MeasureStartHalo]
Measure=Plugin
Plugin=RunCommand
Program=%SystemRoot%\System32\WindowsPowerShell\v1.0\powershell.exe
Parameter=-NoProfile -ExecutionPolicy Bypass -File "#@#Scripts\Update-CodexLimits.ps1" -OutputPath "#@#CodexLimits.inc"
State=Hide
OutputType=ANSI
UpdateDivider=-1
FinishAction=[!ActivateConfig "Rainmeter Codex Halo\Halo" "Standard.ini"][!ActivateConfig "Rainmeter Codex Halo\Control" "Settings.ini"][!DeactivateConfig "Rainmeter Codex Halo\Welcome"]

[MeterPanel]
Meter=Shape
X=0
Y=0
W=#W#
H=#H#
Shape=Rectangle 0,0,#W#,#H#,16 | Fill Color #PanelFill# | StrokeWidth 1 | Stroke Color #PanelEdge#
Shape2=Rectangle 24,24,58,4,2 | Fill Color 255,255,255,82 | StrokeWidth 0
DynamicVariables=1

[MeterTitle]
Meter=String
X=24
Y=42
W=245
H=28
FontFace=#FontFace#
FontSize=17
FontWeight=800
FontColor=#TextColor#
StringAlign=Left
AntiAlias=1
Text=CODEX HALO

[MeterSubtitle]
Meter=String
X=24
Y=73
W=300
H=18
FontFace=#TextFace#
FontSize=9
FontColor=#DimText#
StringAlign=Left
AntiAlias=1
Text=Start here

[MeterStatus]
Meter=String
X=24
Y=104
W=328
H=20
FontFace=#TextFace#
FontSize=9
FontColor=#DimText#
StringAlign=Left
AntiAlias=1
ClipString=1
Text=5H #FiveHourValue#%   WEEK #WeeklyValue#%   checked #LastChecked#
DynamicVariables=1

[ButtonStart]
Meter=Shape
X=24
Y=142
W=150
H=38
Shape=Rectangle 0,0,150,38,10 | Fill Color #ButtonFill# | StrokeWidth 1 | Stroke Color #ButtonStroke#
MouseOverAction=[!SetOption ButtonStart Shape "Rectangle 0,0,150,38,10 | Fill Color #ButtonHover# | StrokeWidth 1 | Stroke Color 255,255,255,72"][!UpdateMeter ButtonStart][!Redraw]
MouseLeaveAction=[!SetOption ButtonStart Shape "Rectangle 0,0,150,38,10 | Fill Color #ButtonFill# | StrokeWidth 1 | Stroke Color #ButtonStroke#"][!UpdateMeter ButtonStart][!Redraw]
LeftMouseUpAction=[!SetOption TextStart Text "Checking..."][!UpdateMeter TextStart][!Redraw][!CommandMeasure MeasureStartHalo "Run"]

[TextStart]
Meter=String
X=99
Y=153
W=142
H=18
FontFace=#TextFace#
FontSize=10
FontWeight=700
FontColor=#TextColor#
StringAlign=Center
AntiAlias=1
Text=Start Halo
LeftMouseUpAction=[!SetOption TextStart Text "Checking..."][!UpdateMeter TextStart][!Redraw][!CommandMeasure MeasureStartHalo "Run"]

[ButtonControl]
Meter=Shape
X=194
Y=142
W=158
H=38
Shape=Rectangle 0,0,158,38,10 | Fill Color #ButtonFill# | StrokeWidth 1 | Stroke Color #ButtonStroke#
MouseOverAction=[!SetOption ButtonControl Shape "Rectangle 0,0,158,38,10 | Fill Color #ButtonHover# | StrokeWidth 1 | Stroke Color 255,255,255,72"][!UpdateMeter ButtonControl][!Redraw]
MouseLeaveAction=[!SetOption ButtonControl Shape "Rectangle 0,0,158,38,10 | Fill Color #ButtonFill# | StrokeWidth 1 | Stroke Color #ButtonStroke#"][!UpdateMeter ButtonControl][!Redraw]
LeftMouseUpAction=[!ActivateConfig "Rainmeter Codex Halo\Control" "Settings.ini"]

[TextControl]
Meter=String
X=273
Y=153
W=150
H=18
FontFace=#TextFace#
FontSize=10
FontWeight=700
FontColor=#TextColor#
StringAlign=Center
AntiAlias=1
Text=Design Control
LeftMouseUpAction=[!ActivateConfig "Rainmeter Codex Halo\Control" "Settings.ini"]

[MeterFooter]
Meter=String
X=24
Y=198
W=328
H=16
FontFace=#TextFace#
FontSize=8
FontColor=#DimText#
StringAlign=Left
AntiAlias=1
Text=Refresh runs locally from Codex session events. Right-click for Rainmeter options.
ClipString=1
