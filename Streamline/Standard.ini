[Rainmeter]
Update=1000
AccurateText=1
DynamicWindowSize=1
BackgroundMode=2
SolidColor=0,0,0,1
ContextTitle=Open Codex Halo Control
ContextAction=[!ActivateConfig "Rainmeter Codex Halo\Control" "Settings.ini"]
ContextTitle2=Refresh Codex Data
ContextAction2=[!CommandMeasure MeasureReadLimits "ManualRefreshLimits()"]
Group=CodexHalo
OnRefreshAction=[!CommandMeasure MeasureReadLimits "ReadLimits()"]

[Metadata]
Name=Codex Streamline Standard
Author=PetersMinistry
Information=Thin horizontal Codex limit display with visible reset time and reset date.
License=MIT
Version=0.5.14

[Variables]
@Include1=#@#CodexLimits.inc
@Include2=#@#Options.inc
W=540
H=40
PanelFill=6,10,16,34
PanelEdge=255,255,255,18
TrackColor=255,255,255,36
TextColor=246,248,252,242
DimText=163,173,188,220
FiveColor=41,232,139,255
WeekColor=82,160,255,255
FontFace=Segoe UI Variable Display
TextFace=Segoe UI Variable Text

[MeasureFiveBar]
Measure=Calc
Formula=(#FiveHourValue# * 1.36)
DynamicVariables=1

[MeasureWeekBar]
Measure=Calc
Formula=(#WeeklyValue# * 0.62)
DynamicVariables=1

[MeasureReadLimits]
Measure=Script
ScriptFile=#@#Scripts\Read-CodexLimits.lua
LimitsPath=#@#CodexLimits.inc
UpdateDivider=1

[MeasureRefresh]
Measure=Plugin
Plugin=RunCommand
Disabled=1
Program=%SystemRoot%\System32\WindowsPowerShell\v1.0\powershell.exe
Parameter=-NoProfile -ExecutionPolicy Bypass -File "#@#Scripts\Update-CodexLimits.ps1" -OutputPath "#@#CodexLimits.inc"
State=Hide
OutputType=ANSI
UpdateDivider=-1
Timeout=60000
FinishAction=[!CommandMeasure MeasureReadLimits "FinishRefresh()"]


[MeasureRefreshTimer]
Measure=Calc
Formula=1
UpdateDivider=-1
DynamicVariables=1
; OnUpdateAction is handled by MeasureReadLimits.Update()

[MeterCanvas]
Meter=Shape
X=0
Y=0
W=#W#
H=#H#
Shape=Rectangle 0,0,#W#,#H# | Fill Color 0,0,0,1 | StrokeWidth 0

[MeterPanel]
Meter=Shape
X=0
Y=0
W=#W#
H=#H#
Shape=Rectangle 0,0,#W#,#H# | Fill Color #PanelFill# | StrokeWidth 0
Shape2=Rectangle 11,0,178,1,1 | Fill Color 41,232,139,118 | StrokeWidth 0
Shape3=Rectangle 352,39,122,1,1 | Fill Color 82,160,255,108 | StrokeWidth 0
Shape4=Rectangle 16,11,2,18,1 | Fill Color 255,255,255,58 | StrokeWidth 0
Shape5=Rectangle 152,27,136,2,1 | Fill Color #TrackColor# | StrokeWidth 0
Shape6=Rectangle 152,27,[MeasureFiveBar],2,1 | Fill Color #FiveColor# | StrokeWidth 0
Shape7=Rectangle 396,27,62,2,1 | Fill Color #TrackColor# | StrokeWidth 0
Shape8=Rectangle 396,27,[MeasureWeekBar],2,1 | Fill Color #WeekColor# | StrokeWidth 0
DynamicVariables=1
LeftMouseUpAction=[!SetOption MeterStatus Text "checking..."][!UpdateMeter MeterStatus][!Redraw][!CommandMeasure MeasureReadLimits "ManualRefreshLimits()"]

[MeterBrand]
Meter=String
X=30
Y=11
W=52
H=16
