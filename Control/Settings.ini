[Rainmeter]
Update=1000
AccurateText=1
DynamicWindowSize=1
BackgroundMode=2
SolidColor=0,0,0,1
ContextTitle=Open Codex Halo Control
ContextAction=[!ActivateConfig "Rainmeter Codex Halo\Control" "Settings.ini"]
ContextTitle2=Refresh Codex Data
ContextAction2=[!CommandMeasure MeasureRefresh "Run"]
Group=CodexHalo
[Metadata]
Name=Codex Halo Control
Author=PetersMinistry
Information=Design and size selector for Rainmeter Codex Halo.
License=MIT
Version=0.5.3

[Variables]
@Include1=#@#CodexLimits.inc
@Include2=#@#Options.inc
W=392
H=444
PanelFill=7,12,19,232
PanelEdge=255,255,255,48
ButtonFill=255,255,255,20
ButtonHover=255,255,255,36
ButtonStroke=255,255,255,42
TextColor=246,248,252,242
DimText=163,173,188,220
FiveColor=41,232,139,255
WeekColor=82,160,255,255
FontFace=Segoe UI Variable Display
TextFace=Segoe UI Variable Text

[MeasureRefresh]
Measure=Plugin
Plugin=RunCommand
Program=%SystemRoot%\System32\WindowsPowerShell\v1.0\powershell.exe
Parameter=-NoProfile -ExecutionPolicy Bypass -File "#@#Scripts\Update-CodexLimits.ps1" -OutputPath "#@#CodexLimits.inc"
State=Hide
OutputType=ANSI
UpdateDivider=-1
FinishAction=[!Refresh "#CURRENTCONFIG#"][!Refresh "Rainmeter Codex Halo\Welcome"][!Refresh "Rainmeter Codex Halo\Control"][!Refresh "Rainmeter Codex Halo\Halo"][!Refresh "Rainmeter Codex Halo\Horizontal"][!Refresh "Rainmeter Codex Halo\Vertical"][!Refresh "Rainmeter Codex Halo\Glyph"]

[MeterPanel]
Meter=Shape
X=0
Y=0
W=#W#
H=#H#
Shape=Rectangle 0,0,#W#,#H#,16 | Fill Color #PanelFill# | StrokeWidth 1 | Stroke Color #PanelEdge#
Shape2=Rectangle 22,22,54,4,2 | Fill Color 255,255,255,78 | StrokeWidth 0
DynamicVariables=1

[MeterTitle]
Meter=String
X=22
Y=38
W=230
H=26
FontFace=#FontFace#
FontSize=16
FontWeight=800
FontColor=#TextColor#
StringAlign=Left
AntiAlias=1
Text=CODEX HALO

[MeterSubtitle]
Meter=String
X=22
Y=66
W=250
H=16
FontFace=#TextFace#
FontSize=8
FontColor=#DimText#
StringAlign=Left
AntiAlias=1
Text=design control

[MeterExitButton]
Meter=Shape
X=348
Y=16
W=24
H=24
Shape=Rectangle 0,0,24,24,12 | Fill Color #ButtonFill# | StrokeWidth 1 | Stroke Color #ButtonStroke#
ToolTipText=Close the Codex Halo control panel
MouseOverAction=[!SetOption MeterExitButton Shape "Rectangle 0,0,24,24,12 | Fill Color #ButtonHover# | StrokeWidth 1 | Stroke Color 255,255,255,72"][!UpdateMeter MeterExitButton][!Redraw]
MouseLeaveAction=[!SetOption MeterExitButton Shape "Rectangle 0,0,24,24,12 | Fill Color #ButtonFill# | StrokeWidth 1 | Stroke Color #ButtonStroke#"][!UpdateMeter MeterExitButton][!Redraw]
LeftMouseUpAction=[!DeactivateConfig "Rainmeter Codex Halo\Control"]

[MeterExitText]
Meter=String
X=360
Y=18
W=24
H=20
FontFace=#TextFace#
FontSize=10
FontWeight=700
FontColor=#TextColor#
StringAlign=Center
AntiAlias=1
Text=X
ToolTipText=Close the Codex Halo control panel
LeftMouseUpAction=[!DeactivateConfig "Rainmeter Codex Halo\Control"]

[MeterRefreshPill]
Meter=Shape
X=254
Y=42
W=112
H=24
Shape=Rectangle 0,0,112,24,12 | Fill Color #ButtonFill# | StrokeWidth 1 | Stroke Color #ButtonStroke#
ToolTipText=Refreshes from the latest Codex rate-limit event
MouseOverAction=[!SetOption MeterRefreshPill Shape "Rectangle 0,0,112,24,12 | Fill Color #ButtonHover# | StrokeWidth 1 | Stroke Color 255,255,255,72"][!UpdateMeter MeterRefreshPill][!Redraw]
MouseLeaveAction=[!SetOption MeterRefreshPill Shape "Rectangle 0,0,112,24,12 | Fill Color #ButtonFill# | StrokeWidth 1 | Stroke Color #ButtonStroke#"][!UpdateMeter MeterRefreshPill][!Redraw]
LeftMouseUpAction=[!SetOption MeterRefreshText Text "checking..."][!UpdateMeter MeterRefreshText][!Redraw][!CommandMeasure MeasureRefresh "Run"]

