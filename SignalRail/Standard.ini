[Rainmeter]
Update=1000
AccurateText=1
DynamicWindowSize=1
BackgroundMode=2
SolidColor=0,0,0,1
ContextTitle=Open Codex Halo Control
ContextAction=[!ActivateConfig "Rainmeter Codex Halo\Control" "Settings.ini"]
ContextTitle2=Refresh Codex Data
ContextAction2=[!CommandMeasure MeasureReadLimits "ManualRefreshLimits()"]
Group=CodexHalo
OnRefreshAction=[!CommandMeasure MeasureReadLimits "ReadLimits()"]

[Metadata]
Name=Codex Signal Rail Standard
Author=PetersMinistry
Information=Compact segmented rail Codex limit display.
License=MIT
Version=0.5.12

[Variables]
@Include1=#@#CodexLimits.inc
@Include2=#@#Options.inc
W=590
H=82
PanelFill=5,9,14,36
PanelEdge=90,160,255,58
RailTrack=186,214,255,58
TextColor=246,248,252,244
DimText=156,166,182,222
FiveColor=33,232,156,255
WeekColor=73,178,255,255
FontFace=Bahnschrift
DataFace=Cascadia Mono
TextFace=Bahnschrift

[MeasureFiveRail]
Measure=Calc
Formula=(#FiveHourValue# * 1.18)
DynamicVariables=1

[MeasureFiveRailX]
Measure=Calc
Formula=(294 - [MeasureFiveRail])
DynamicVariables=1

[MeasureWeekRail]
Measure=Calc
Formula=(#WeeklyValue# * 1.18)
DynamicVariables=1

[MeasureReadLimits]
Measure=Script
ScriptFile=#@#Scripts\Read-CodexLimits.lua
LimitsPath=#@#CodexLimits.inc
UpdateDivider=1

[MeasureRefresh]
Measure=Plugin
Plugin=RunCommand
Disabled=1
Program=%SystemRoot%\System32\WindowsPowerShell\v1.0\powershell.exe
Parameter=-NoProfile -ExecutionPolicy Bypass -File "#@#Scripts\Update-CodexLimits.ps1" -OutputPath "#@#CodexLimits.inc"
State=Hide
OutputType=ANSI
UpdateDivider=-1
Timeout=60000
FinishAction=[!CommandMeasure MeasureReadLimits "FinishRefresh()"]


[MeasureRefreshTimer]
Measure=Calc
Formula=1
UpdateDivider=-1
DynamicVariables=1
; OnUpdateAction is handled by MeasureReadLimits.Update()

[MeterCanvas]
Meter=Shape
X=0
Y=0
W=#W#
H=#H#
Shape=Rectangle 0,0,#W#,#H# | Fill Color 0,0,0,1 | StrokeWidth 0

[MeterSurface]
Meter=Shape
X=0
Y=0
W=#W#
H=#H#
Shape=Line 30,42,560,42 | StrokeWidth 1 | Stroke Color #RailTrack#
Shape2=Rectangle 30,41,4,2,1 | Fill Color 43,226,255,150 | StrokeWidth 0
Shape3=Rectangle 556,41,4,2,1 | Fill Color 43,226,255,150 | StrokeWidth 0
Shape4=Rectangle 176,50,118,2,1 | Fill Color 255,255,255,26 | StrokeWidth 0
Shape5=Rectangle 298,50,118,2,1 | Fill Color 255,255,255,26 | StrokeWidth 0
Shape6=Rectangle [MeasureFiveRailX],50,[MeasureFiveRail],2,1 | Fill Color #FiveColor# | StrokeWidth 0
Shape7=Rectangle 298,50,[MeasureWeekRail],2,1 | Fill Color #WeekColor# | StrokeWidth 0
Shape8=Rectangle 292,47,4,8,2 | Fill Color 255,255,255,50 | StrokeWidth 0
Shape9=Rectangle 290,49,8,4,2 | Fill Color 73,178,255,52 | StrokeWidth 0
DynamicVariables=1
LeftMouseUpAction=[!CommandMeasure MeasureReadLimits "ManualRefreshLimits()"]

[MeterFive]
Meter=String
X=188
Y=28
W=88
H=18
FontFace=#DataFace#
FontSize=10
FontWeight=700
FontColor=#FiveColor#
StringAlign=Right
AntiAlias=1
Text=5H #FiveHourValue#%
DynamicVariables=1

[MeterFiveReset]
Meter=String
X=188
Y=58
W=88
H=12
FontFace=#TextFace#
FontSize=7
FontColor=#DimText#
StringAlign=Right
AntiAlias=1
ClipString=1
Text=ends #FiveHourReset#
DynamicVariables=1

[MeterWeek]
Meter=String
X=382
Y=28
W=94
H=18
FontFace=#DataFace#
FontSize=10
FontWeight=700
FontColor=#WeekColor#
StringAlign=Left
AntiAlias=1
Text=WEEK #WeeklyValue#%
DynamicVariables=1

[MeterWeekDate]
Meter=String
X=382
Y=58
W=94
H=12
FontFace=#TextFace#
FontSize=7
FontColor=#DimText#
StringAlign=Left
AntiAlias=1
ClipString=1
Text=#WeeklyReset#
DynamicVariables=1

[MeterCodex]
Meter=String
X=70
Y=56
W=78
H=12
FontFace=#TextFace#
FontSize=7
FontWeight=700
FontColor=#TextColor#
StringAlign=Left
AntiAlias=1
ClipString=1
Text=CODEX



