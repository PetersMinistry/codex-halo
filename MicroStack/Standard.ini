[Rainmeter]
Update=1000
AccurateText=1
DynamicWindowSize=1
BackgroundMode=2
SolidColor=0,0,0,1
ContextTitle=Open Codex Halo Control
ContextAction=[!ActivateConfig "Rainmeter Codex Halo\Control" "Settings.ini"]
ContextTitle2=Refresh Codex Data
ContextAction2=[!CommandMeasure MeasureReadLimits "RefreshLimits()"]
Group=CodexHalo
OnRefreshAction=[!CommandMeasure MeasureReadLimits "ReadLimits()"]

[Metadata]
Name=Codex Micro Stack Standard
Author=PetersMinistry
Information=Compact two-line stacked Codex limit display.
License=MIT
Version=0.5.10

[Variables]
@Include1=#@#CodexLimits.inc
@Include2=#@#Options.inc
W=218
H=104
PanelFill=5,9,14,66
PanelEdge=82,160,255,52
RailTrack=255,255,255,24
TextColor=246,248,252,244
DimText=156,166,182,224
FiveColor=33,232,156,255
WeekColor=73,178,255,255
FontFace=Bahnschrift
DataFace=Cascadia Mono
TextFace=Bahnschrift
RefreshBusy=0

[MeasureFiveRail]
Measure=Calc
Formula=(#FiveHourValue# * 0.88)
DynamicVariables=1

[MeasureWeekRail]
Measure=Calc
Formula=(#WeeklyValue# * 0.88)
DynamicVariables=1

[MeasureReadLimits]
Measure=Script
ScriptFile=#@#Scripts\Read-CodexLimits.lua
LimitsPath=#@#CodexLimits.inc

[MeasureRefresh]
Measure=Plugin
Plugin=RunCommand
Program=%SystemRoot%\System32\WindowsPowerShell\v1.0\powershell.exe
Parameter=-NoProfile -ExecutionPolicy Bypass -File "#@#Scripts\Update-CodexLimits.ps1" -OutputPath "#@#CodexLimits.inc"
State=Hide
OutputType=ANSI
UpdateDivider=-1
Timeout=60000
FinishAction=[!CommandMeasure MeasureReadLimits "FinishRefresh()"]

[MeterCanvas]
Meter=Shape
X=0
Y=0
W=#W#
H=#H#
Shape=Rectangle 0,0,#W#,#H# | Fill Color 0,0,0,1 | StrokeWidth 0

[MeterSurface]
Meter=Shape
X=0
Y=0
W=#W#
H=#H#
Shape=Path Plate | Fill Color #PanelFill# | StrokeWidth 1 | Stroke Color #PanelEdge#
Plate=36,18 | LineTo 176,18 | LineTo 196,38 | LineTo 196,78 | LineTo 184,90 | LineTo 38,90 | LineTo 20,72 | LineTo 20,34 | ClosePath 1
Shape2=Line 38,50,184,50 | StrokeWidth 1 | Stroke Color 255,255,255,16
Shape3=Rectangle 50,30,78,1,1 | Fill Color #FiveColor# | StrokeWidth 0
Shape4=Rectangle 156,31,3,3,2 | Fill Color #WeekColor# | StrokeWidth 0
Shape5=Rectangle 164,31,3,3,2 | Fill Color #WeekColor# | StrokeWidth 0
Shape6=Rectangle 172,31,3,3,2 | Fill Color #WeekColor# | StrokeWidth 0
Shape7=Rectangle 118,66,64,1,1 | Fill Color #RailTrack# | StrokeWidth 0
Shape8=Rectangle 118,66,52,1,1 | Fill Color #FiveColor# | StrokeWidth 0
Shape9=Rectangle 118,85,64,1,1 | Fill Color #RailTrack# | StrokeWidth 0
Shape10=Rectangle 118,85,50,1,1 | Fill Color #WeekColor# | StrokeWidth 0
DynamicVariables=1
LeftMouseUpAction=[!CommandMeasure MeasureReadLimits "RefreshLimits()"]

[MeterCodex]
Meter=String
X=50
Y=32
W=86
H=12
FontFace=#TextFace#
FontSize=7
FontWeight=700
FontColor=#TextColor#
StringAlign=Left
AntiAlias=1
Text=C  O  D  E  X

[MeterFiveTag]
Meter=String
X=50
Y=57
W=34
H=12
FontFace=#TextFace#
FontSize=7
FontWeight=700
FontColor=#FiveColor#
StringAlign=Left
AntiAlias=1
Text=5H

[MeterFiveValue]
Meter=String
X=72
Y=54
W=42
H=18
FontFace=#DataFace#
FontSize=10
FontWeight=700
FontColor=#FiveColor#
StringAlign=Left
AntiAlias=1
Text=#FiveHourValue#%
DynamicVariables=1

[MeterFiveReset]
Meter=String
X=122
Y=57
W=62
H=12
FontFace=#TextFace#
FontSize=7
FontColor=#DimText#
StringAlign=Left
AntiAlias=1
ClipString=1
Text=#FiveHourReset#
DynamicVariables=1

[MeterWeekTag]
Meter=String
X=50
Y=76
W=34
H=12
FontFace=#TextFace#
FontSize=7
FontWeight=700
FontColor=#WeekColor#
StringAlign=Left
AntiAlias=1
Text=WK

[MeterWeekValue]
Meter=String
X=72
Y=73
W=42
H=18
FontFace=#DataFace#
FontSize=10
FontWeight=700
FontColor=#WeekColor#
StringAlign=Left
AntiAlias=1
Text=#WeeklyValue#%
DynamicVariables=1

[MeterWeekReset]
Meter=String
X=122
Y=76
W=62
H=12
FontFace=#TextFace#
FontSize=7
FontColor=#DimText#
StringAlign=Left
AntiAlias=1
ClipString=1
Text=#WeeklyReset#
DynamicVariables=1

